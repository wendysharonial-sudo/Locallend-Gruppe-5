{% extends "base.html" %}

{% block title %}Registrieren - LocalLend{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="custom-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Konto erstellen</h2>
                    <p class="text-secondary">Tritt unserer Community bei und beginne zu teilen.</p>
                </div>
                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}          
                </div>
                {% endif %}
                
                <form action="/register" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label fw-semibold">Vorname</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Max" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label fw-semibold">Nachname</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Mustermann" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">E-Mail Adresse</label>
                        <!-- Hier nutze ich Bootstrap 'input-group' um das Icon mit dem Input zu verbinden -->
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-secondary"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="name@beispiel.de" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Passwort</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-secondary"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg btn-custom">
                            <i class="bi bi-person-plus"></i> Registrieren
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="mb-0 text-secondary">Bereits ein Konto? <a href="/login" class="text-primary fw-semibold text-decoration-none">Hier anmelden</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
