{% extends "base.html" %}

{% block title %}Objekt anbieten - LocalLend{% endblock %}

{% block content %}
<div class="container mt-4 pt-3">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="custom-card">
                <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                    <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex p-3 me-3">
                        <i class="bi bi-plus-circle fs-3"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-0">Neues Objekt anbieten</h2>
                        <p class="text-secondary mb-0">Teile etwas mit deiner Nachbarschaft.</p>
                    </div>
                </div>
                
                <form action="/add_item" method="POST">
                    <div class="mb-4">
                        <label for="name" class="form-label fw-semibold">Name des Objekts</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="z.B. Bosch Schlagbohrmaschine" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label fw-semibold">Beschreibung</label>
                        <!-- Textarea für längeren Text -->
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Beschreibe den Zustand und Besonderheiten..." required></textarea>
                    </div>
                    
                    <div class="row">
                        <!-- Dropdown für Kategorien -->
                        <div class="col-md-6 mb-4">
                            <label for="category" class="form-label fw-semibold">Kategorie</label>
                            <select class="form-select form-control" id="category" name="category" required>
                                <option value="" disabled selected>Bitte wählen...</option>
                                <option value="tools">Werkzeuge</option>
                                <option value="sports">Sport & Freizeit</option>
                                <option value="electronics">Elektronik</option>
                                <option value="other">Sonstiges</option>
                            </select>
                        </div>
                        <!-- Dropdown für Zustand -->
                        <div class="col-md-6 mb-4">
                            <label for="condition" class="form-label fw-semibold">Zustand</label>
                            <select class="form-select form-control" id="condition" name="condition" required>
                                <option value="new">Wie neu</option>
                                <option value="good" selected>Gut</option>
                                <option value="used">Gebraucht</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                        <a href="/items" class="btn btn-outline-secondary btn-custom">Abbrechen</a>
                        <button type="submit" class="btn btn-primary btn-lg btn-custom px-5">
                            <i class="bi bi-check-lg"></i> Speichern
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
